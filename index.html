<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Barry Bark Stopper 🌭</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #FFF8F0; --card: #ffffff; --accent: #FF6B35; --dark: #2D1B00; --muted: #9B7B5A; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 16px 12px 40px; background-image: radial-gradient(circle at 20% 20%, #FFE8D6 0%, transparent 50%), radial-gradient(circle at 80% 80%, #FFF0E0 0%, transparent 50%); }
  header { text-align: center; margin-bottom: 24px; animation: fadeDown 0.5s ease; }
  header h1 { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--dark); }
  header p { color: var(--muted); font-size: 0.85rem; font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .sausage { font-size: 2.4rem; display: block; margin-bottom: 4px; animation: wiggle 2s ease-in-out infinite; }
  #playing-banner { display: none; background: var(--accent); color: white; font-family: 'Fredoka One', cursive; font-size: 1.1rem; padding: 10px 24px; border-radius: 50px; margin-bottom: 20px; text-align: center; animation: pulse 0.6s ease-in-out infinite alternate; width: 100%; max-width: 340px; }
  #playing-banner.visible { display: block; }
  .volume-row { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; width: 100%; max-width: 340px; }
  .volume-row input[type=range] { flex: 1; accent-color: var(--accent); height: 6px; cursor: pointer; }
  .vol-icon { font-size: 1.2rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 340px; }
  .sound-btn { background: var(--card); border: 3px solid transparent; border-radius: 20px; padding: 20px 12px 16px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: transform 0.12s, box-shadow 0.12s; box-shadow: 0 4px 14px rgba(0,0,0,0.08); -webkit-tap-highlight-color: transparent; user-select: none; }
  .sound-btn:active { transform: scale(0.93); }
  .sound-btn.playing { border-color: currentColor; box-shadow: 0 0 0 4px rgba(255,107,53,0.2); transform: scale(1.03); }
  .sound-btn .emoji { font-size: 2.4rem; line-height: 1; }
  .sound-btn .label { font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--dark); text-align: center; }
  .sound-btn .sublabel { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
  .btn-orange { --c: #FF6B35; } .btn-blue { --c: #4A90D9; } .btn-purple { --c: #9B59B6; } .btn-green { --c: #27AE60; } .btn-red { --c: #E74C3C; } .btn-teal { --c: #1ABC9C; } .btn-gold { --c: #F39C12; } .btn-pink { --c: #E91E8C; }
  .sound-btn { color: var(--c, var(--accent)); }
  .sound-btn.playing { background: color-mix(in srgb, var(--c, var(--accent)) 10%, white); }
  #stop-btn { margin-top: 18px; width: 100%; max-width: 340px; padding: 16px; border: none; border-radius: 16px; background: var(--dark); color: white; font-family: 'Fredoka One', cursive; font-size: 1.3rem; cursor: pointer; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; }
  #stop-btn:active { transform: scale(0.96); background: #111; }
  .loop-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; width: 100%; max-width: 340px; }
  .loop-row label { font-weight: 800; font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .toggle { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: #ddd; border-radius: 26px; cursor: pointer; transition: background 0.2s; }
  .slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  .toggle input:checked + .slider { background: var(--accent); }
  .toggle input:checked + .slider::before { transform: translateX(20px); }
  .voice-cards { display: flex; flex-direction: column; gap: 12px; }
  .vcard { border-radius: 18px; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .vcard-no { background: #1A0A0A; color: #FF3B30; box-shadow: 0 4px 16px rgba(180,0,0,0.25); }
  .vcard-stop { background: #0D0D1A; color: #8B7FF5; box-shadow: 0 4px 16px rgba(80,60,200,0.2); }
  .vcard-yes { background: #0A1F0A; color: #2ECC71; box-shadow: 0 4px 16px rgba(46,204,113,0.2); }
  .vcard-top { display: flex; align-items: center; gap: 10px; }
  .vcard-play { flex: 1; border: none; border-radius: 12px; padding: 14px 10px; font-family: 'Fredoka One', cursive; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; user-select: none; opacity: 0.4; pointer-events: none; }
  .vcard-play.ready { opacity: 1; pointer-events: auto; }
  .vcard-play:active { transform: scale(0.93); }
  .vcard-no .vcard-play { background: #2A0A0A; color: #FF3B30; }
  .vcard-stop .vcard-play { background: #15153A; color: #8B7FF5; }
  .vcard-yes .vcard-play { background: #0A2A0A; color: #2ECC71; }
  .vcard-rec { border: 2px solid rgba(255,255,255,0.2); border-radius: 14px; width: 64px; flex-shrink: 0; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; font-size: 1.4rem; padding: 8px 4px 6px; transition: transform 0.1s; -webkit-tap-highlight-color: transparent; background: rgba(255,255,255,0.08); animation: idlepulse 2s ease-in-out infinite; }
  .vcard-rec-label { font-family: 'Nunito', sans-serif; font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.7; color: inherit; }
  .vcard-rec:active { transform: scale(0.9); }
  .vcard-rec.recording { animation: recpulse 0.7s ease-in-out infinite alternate; border-color: rgba(255,80,80,0.8); }
  .vcard-pitch { display: flex; align-items: center; gap: 8px; }
  .vcard-pitch label { font-family: 'Nunito', sans-serif; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.6; white-space: nowrap; }
  .vcard-pitch input[type=range] { flex: 1; height: 4px; cursor: pointer; }
  .vcard-no .vcard-pitch input { accent-color: #FF3B30; }
  .vcard-stop .vcard-pitch input { accent-color: #8B7FF5; }
  .vcard-yes .vcard-pitch input { accent-color: #2ECC71; }
  .vcard-hint { font-family: 'Nunito', sans-serif; font-size: 0.7rem; font-weight: 700; opacity: 0.5; text-align: center; }
  .divider { width: 100%; max-width: 340px; border: none; border-top: 2px dashed #F0E0D0; margin: 4px 0 20px; }
  .voice-section { width: 100%; max-width: 340px; margin-bottom: 20px; }
  .voice-section-label { font-weight: 800; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; display: block; }
  @keyframes idlepulse { 0%,100% { border-color: rgba(255,255,255,0.15); } 50% { border-color: rgba(255,255,255,0.45); } }
  @keyframes recpulse { from { box-shadow: 0 0 0 0 rgba(255,59,48,0.6); } to { box-shadow: 0 0 0 8px rgba(255,59,48,0); } }
  @keyframes wiggle { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg); } }
  @keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: translateY(0); } }
  @keyframes pulse { from { opacity: 0.85; } to { opacity: 1; } }
</style>
</head>
<body>
<header>
  <span class="sausage">🌭</span>
  <h1>Barry Bark Stopper</h1>
  <p>Tap to interrupt — stop him quick</p>
</header>
<div id="playing-banner">🔊 Playing — tap again to stop</div>
<div class="volume-row">
  <span class="vol-icon">🔈</span>
  <input type="range" id="vol" min="0" max="1" step="0.05" value="1">
  <span class="vol-icon">🔊</span>
</div>
<div class="loop-row">
  <label>Loop sound</label>
  <label class="toggle"><input type="checkbox" id="loop-toggle"><span class="slider"></span></label>
</div>
<div class="voice-section">
  <span class="voice-section-label">🗣️ Your Voice Commands</span>
  <div id="voice-cards"></div>
</div>
<hr class="divider">
<span class="voice-section-label" style="width:100%;max-width:340px;display:block;margin-bottom:10px;">🔊 Interrupt Sounds</span>
<div class="grid" id="grid"></div>
<button id="stop-btn">⏹ Stop All Sounds</button>
<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();
let currentSource = null, currentBtn = null, volume = 1;
const volSlider = document.getElementById('vol');
const loopToggle = document.getElementById('loop-toggle');
const banner = document.getElementById('playing-banner');
volSlider.addEventListener('input', e => { volume = parseFloat(e.target.value); });
const sounds = [
  { id:'ultrasonic', label:'Ultrasonic Blast', sublabel:'High freq interrupt', emoji:'📡', cls:'btn-blue', gen:()=>tone([18000,20000,17000],[0.3,0.3,0.3],'sine') },
  { id:'hiss', label:'Air Hiss', sublabel:'Like compressed air', emoji:'💨', cls:'btn-teal', gen:()=>noise('white',0.6,true) },
  { id:'whistle', label:'Sharp Whistle', sublabel:'Attention grabber', emoji:'🎵', cls:'btn-orange', gen:()=>tone([3000,2800,3200],[0.15,0.2,0.15],'sine') },
  { id:'rattle', label:'Shake Can', sublabel:'Coin rattle', emoji:'🥤', cls:'btn-gold', gen:()=>rattle() },
  { id:'lowbark', label:'Dog Bark', sublabel:'Another dog sound', emoji:'🐕', cls:'btn-red', gen:()=>bark() },
  { id:'clicker', label:'Training Click', sublabel:'Mark the silence', emoji:'✅', cls:'btn-green', gen:()=>click() },
  { id:'whitenoise', label:'White Noise', sublabel:'Mask outside sounds', emoji:'🌊', cls:'btn-purple', gen:()=>noise('white',4,false) },
  { id:'lowrumble', label:'Low Rumble', sublabel:'Calming brown noise', emoji:'🫧', cls:'btn-pink', gen:()=>noise('brown',4,false) },
];
function tone(freqs,durations,type){const nodes=[];let t=ctx.currentTime;const mg=ctx.createGain();mg.gain.value=volume*0.6;mg.connect(ctx.destination);freqs.forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(1,t+0.01);g.gain.linearRampToValueAtTime(0,t+durations[i]);o.connect(g);g.connect(mg);o.start(t);o.stop(t+durations[i]);t+=durations[i];nodes.push(o);});return{nodes,masterGain:mg,duration:durations.reduce((a,b)=>a+b,0)*1000};}
function noise(color,duration,sharp){const sz=ctx.sampleRate*duration,buf=ctx.createBuffer(1,sz,ctx.sampleRate),d=buf.getChannelData(0);if(color==='white'){for(let i=0;i<sz;i++)d[i]=Math.random()*2-1;}else{let l=0;for(let i=0;i<sz;i++){const w=Math.random()*2-1;l=(l+0.02*w)/1.02;d[i]=l*12;}}const src=ctx.createBufferSource();src.buffer=buf;src.loop=loopToggle.checked;const mg=ctx.createGain();mg.gain.value=volume*(sharp?0.8:0.4);if(sharp){mg.gain.setValueAtTime(0,ctx.currentTime);mg.gain.linearRampToValueAtTime(volume*0.9,ctx.currentTime+0.01);mg.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);}src.connect(mg);mg.connect(ctx.destination);src.start();return{nodes:[src],masterGain:mg,duration:sharp?600:duration*1000};}
function rattle(){const mg=ctx.createGain();mg.gain.value=volume*0.5;mg.connect(ctx.destination);const nodes=[];for(let i=0;i<18;i++){const t=ctx.currentTime+i*0.04+Math.random()*0.02,sz=Math.floor(ctx.sampleRate*0.04),buf=ctx.createBuffer(1,sz,ctx.sampleRate),d=buf.getChannelData(0);for(let j=0;j<sz;j++)d[j]=(Math.random()*2-1)*Math.exp(-j/(sz*0.3));const s=ctx.createBufferSource(),g=ctx.createGain();s.buffer=buf;g.gain.value=0.4+Math.random()*0.6;s.connect(g);g.connect(mg);s.start(t);nodes.push(s);}return{nodes,masterGain:mg,duration:900};}
function bark(){const mg=ctx.createGain();mg.gain.value=volume*0.5;mg.connect(ctx.destination);const nodes=[];[0,0.45].forEach(off=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(180,ctx.currentTime+off);o.frequency.exponentialRampToValueAtTime(90,ctx.currentTime+off+0.15);g.gain.setValueAtTime(0,ctx.currentTime+off);g.gain.linearRampToValueAtTime(0.9,ctx.currentTime+off+0.02);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+off+0.25);o.connect(g);g.connect(mg);o.start(ctx.currentTime+off);o.stop(ctx.currentTime+off+0.3);nodes.push(o);});return{nodes,masterGain:mg,duration:800};}
function click(){const mg=ctx.createGain();mg.gain.value=volume*0.8;mg.connect(ctx.destination);const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=1200;g.gain.setValueAtTime(1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.04);o.connect(g);g.connect(mg);o.start();o.stop(ctx.currentTime+0.05);return{nodes:[o],masterGain:mg,duration:120};}
function stopAll(){if(currentSource){try{currentSource.nodes.forEach(n=>{try{n.stop();}catch(e){}});currentSource.masterGain.disconnect();}catch(e){}currentSource=null;}if(currentBtn){currentBtn.classList.remove('playing');currentBtn=null;}banner.classList.remove('visible');clearTimeout(window._autoStopTimer);}
document.getElementById('stop-btn').addEventListener('click',stopAll);
function playSound(sound,btn){ctx.resume();if(currentBtn===btn){stopAll();return;}stopAll();const result=sound.gen();currentSource=result;currentBtn=btn;btn.classList.add('playing');banner.classList.add('visible');if(!loopToggle.checked){clearTimeout(window._autoStopTimer);window._autoStopTimer=setTimeout(()=>{if(currentBtn===btn)stopAll();},result.duration+200);}}
const voiceDefs=[{id:'no',label:'🚫 NO',cls:'vcard-no',hint:'Say "No!" firmly',defaultPitch:0.7},{id:'stop',label:'✋ STOP',cls:'vcard-stop',hint:'Say "Stop!" dominantly',defaultPitch:0.75},{id:'yes',label:'⭐ YES',cls:'vcard-yes',hint:'Say "Yes! Good boy!" happily',defaultPitch:1.3}];
const recordings={},pitchVals={};
const vcContainer=document.getElementById('voice-cards');
vcContainer.className='voice-cards';
voiceDefs.forEach(def=>{
  pitchVals[def.id]=def.defaultPitch;
  const saved=localStorage.getItem('voice_'+def.id);
  if(saved){fetch(saved).then(r=>r.arrayBuffer()).then(ab=>ctx.decodeAudioData(ab)).then(buf=>{recordings[def.id]=buf;updatePlayBtn(def.id);}).catch(()=>{});}
  const card=document.createElement('div');
  card.className=`vcard ${def.cls}`;
  card.id='vcard-'+def.id;
  card.innerHTML=`<div class="vcard-top"><button class="vcard-play" id="vplay-${def.id}">${def.label}</button><button class="vcard-rec" id="vrec-${def.id}">🎙️<span class="vcard-rec-label">HOLD</span></button></div><div class="vcard-pitch"><label>Pitch</label><input type="range" id="vpitch-${def.id}" min="0.5" max="2" step="0.05" value="${def.defaultPitch}"></div><div class="vcard-hint" id="vhint-${def.id}">${def.hint} — hold 🎙️ to record</div>`;
  vcContainer.appendChild(card);
  document.getElementById('vpitch-'+def.id).addEventListener('input',e=>{pitchVals[def.id]=parseFloat(e.target.value);});
  document.getElementById('vplay-'+def.id).addEventListener('click',()=>playVoiceRecording(def.id));
  const recBtn=document.getElementById('vrec-'+def.id);
  let mr=null,chunks=[];
  recBtn.addEventListener('pointerdown',async()=>{
    await ctx.resume();
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      chunks=[];mr=new MediaRecorder(stream);
      mr.ondataavailable=e=>chunks.push(e.data);
      mr.onstop=async()=>{stream.getTracks().forEach(t=>t.stop());const blob=new Blob(chunks,{type:'audio/webm'});const ab=await blob.arrayBuffer();const buf=await ctx.decodeAudioData(ab);recordings[def.id]=buf;updatePlayBtn(def.id);setHint(def.id,'✅ Recorded! Tap to play, adjust pitch below');const reader=new FileReader();reader.onload=()=>localStorage.setItem('voice_'+def.id,reader.result);reader.readAsDataURL(blob);};
      mr.start();recBtn.classList.add('recording');recBtn.innerHTML='⏹️<span class="vcard-rec-label">STOP</span>';setHint(def.id,'🔴 Recording… release to stop');
    }catch(e){setHint(def.id,'⚠️ Mic access needed — check browser permissions');}
  });
  recBtn.addEventListener('pointerup',()=>stopRec(mr,recBtn,def.id));
  recBtn.addEventListener('pointerleave',()=>stopRec(mr,recBtn,def.id));
});
function stopRec(mr,btn,id){if(mr&&mr.state==='recording'){mr.stop();btn.classList.remove('recording');btn.innerHTML='🎙️<span class="vcard-rec-label">HOLD</span>';}}
function updatePlayBtn(id){const btn=document.getElementById('vplay-'+id);if(btn)btn.classList.add('ready');}
function setHint(id,text){const el=document.getElementById('vhint-'+id);if(el)el.textContent=text;}
function playVoiceRecording(id){const buf=recordings[id];if(!buf)return;ctx.resume();const src=ctx.createBufferSource();src.buffer=buf;src.playbackRate.value=pitchVals[id];const g=ctx.createGain();g.gain.value=volume;src.connect(g);g.connect(ctx.destination);src.start();}
const grid=document.getElementById('grid');
sounds.forEach(s=>{const btn=document.createElement('button');btn.className=`sound-btn ${s.cls}`;btn.innerHTML=`<span class="emoji">${s.emoji}</span><span class="label">${s.label}</span><span class="sublabel">${s.sublabel}</span>`;btn.addEventListener('click',()=>playSound(s,btn));grid.appendChild(btn);});
</script>
</body>
</html>
